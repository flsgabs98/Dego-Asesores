<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias | DEGO Asesores</title>

<style>
  .thanks{
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;

    padding: 40px 20px;
  }
  .thanks-box{ max-width:520px; color:var(--white); }
  .thanks-box .ico{
    width:78px;height:78px;border-radius:50%;margin:0 auto 26px;
    background:linear-gradient(135deg, var(--emerald-500), var(--emerald-400));
    display:flex;align-items:center;justify-content:center;color:var(--navy-950);
  }
  .thanks-box .ico svg{ width:36px;height:36px; }
  .thanks-box h1{ color:var(--white); font-size:2rem; margin-bottom:14px; }
  .thanks-box p{ color:rgba(255,255,255,.65); margin-bottom:30px; }
</style>
</head>
<body>
  <div class="thanks">
    <div class="thanks-box">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4 4 10-10"/></svg></div>

      <p>Recibimos tu mensaje. Benjamin Flores Cruz te contactará muy pronto. Si prefieres una respuesta inmediata, escríbenos por WhatsApp.</p>

      <p style="margin-top:24px;"><a href="index.html" style="color:var(--emerald-400);">Volver al sitio</a></p>
    </div>
  </div>
